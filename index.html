<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CST Attendance Portal</title>
    <style>
        /* Modern CSS Styling */
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .qr-card {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 350px;
        }
        h1 { color: #1a73e8; margin: 0; font-size: 1.6rem; }
        .subtitle { color: #5f6368; margin: 5px 0 20px 0; font-size: 0.9rem; }
        
        /* QR Code Container */
        .qr-frame {
            background: #f8f9fa; padding: 15px; border-radius: 15px;
            display: inline-block; margin-bottom: 20px; border: 1px solid #eee;
        }
        #qrImage { width: 250px; height: 250px; display: block; }

        .date-box { font-weight: bold; color: #3c4043; margin-bottom: 10px; }
        .status { color: #34a853; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="qr-card">
        <h1>CST Department</h1>
        <p class="subtitle">Scan for Daily Attendance</p>
        
        <div class="qr-frame">
            <img id="logo" src="logo" alt="Daily QR Code">
        </div>

        <div class="date-box" id="dateDisplay"></div>
        <p class="status">● Link Active for Today</p>
    </div>

    <script>
        // 1. SETTINGS: Change this to your Google Apps Script Web App URL
        const webAppUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfmmTSiDrzl9vcYIuuqV8fN0QuCOcfgHFUAVjTWIbmNPGeGrg/viewform";

        // 2. Get Today's Date (YYYY-MM-DD)
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('dateDisplay').innerText = "Valid for: " + today;

        // 3. Generate the Dynamic QR Link
        // We use Google's Chart API to create the QR on the fly
        const qrSize = "300x300";
        const finalUrl = `https://chart.googleapis.com/chart?chs=${qrSize}&cht=qr&chl=${encodeURIComponent(webAppUrl)}&choe=UTF-8`;

        // 4. Inject into the Image tag
        document.getElementById('qrImage').src = finalUrl;
    </script>

</body>
</html>
